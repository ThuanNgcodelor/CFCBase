<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <title>CFC Base | Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f9fafb;
      color: #111827;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(420px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 20px 45px rgb(15 23 42 / 10%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.6;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      padding: 11px 14px;
    }
  </style>
</head>

<body>
  <main>
    <h1>Dang offline</h1>
    <p>Khong the tai du lieu moi luc nay. Vui long kiem tra ket noi mang roi thu lai.</p>
    <button type="button" onclick="window.location.reload()">Thu lai</button>
  </main>
</body>

</html>
