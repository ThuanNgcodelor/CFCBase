# Safe, version-controlled database migration defaults.
# Existing BookingBase databases must explicitly opt in once with
# FLYWAY_BASELINE_ON_MIGRATE=true after a verified full backup.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Legacy BookingBase schema before Flyway
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=false

# Legacy tables still use ddl-auto=update. This filter prevents Hibernate from
# creating/updating/dropping/truncating Flyway-owned hr_* objects.
spring.jpa.properties.hibernate.hbm2ddl.schema_filter_provider=com.booking.system.config.LegacySchemaFilterProvider
