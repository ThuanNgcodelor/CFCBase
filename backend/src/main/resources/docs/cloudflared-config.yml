# ==========================================
# CẤU HÌNH CLOUDFLARE TUNNEL CHO BOOKING BASE
# ==========================================
# File này dùng để chạy Cloudflare Tunnel kết nối Localhost ra Internet.
# Lệnh chạy: cloudflared tunnel --config D:\Đường_dẫn_của_bạn\backend\src\main\resources\docs\cloudflared-config.yml run bookingbase

# 1. ID của Tunnel (Lấy sau khi chạy lệnh: cloudflared tunnel create bookingbase)
tunnel: <TUNNEL_ID_CỦA_BẠN>

# 2. Đường dẫn tới file JSON chứa credential (Thay thế <Username> bằng tên máy tính của bạn)
credentials-file: C:\Users\<Username>\.cloudflared\<TUNNEL_ID_CỦA_BẠN>.json

# 3. Cấu hình định tuyến (Routing)
ingress:
  # Cấu hình trỏ Domain tới Backend Spring Boot đang chạy ở cổng 8080
  - hostname: api.bookingbase.cfc.com
    service: http://localhost:8080
  
  # Quy tắc bắt buộc cuối cùng (Catch-all)
  - service: http_status:404
