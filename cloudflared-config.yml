
# File cấu hình Cloudflare Tunnel cho BookingBase
# Copy file này lên VPS tại đường dẫn ~/.cloudflared/config.yml hoặc chỉ định đường dẫn khi chạy.

tunnel: 9af3b453-b2c4-4f31-a4a8-bbd2941c41d0
credentials-file: /home/david-nguyen/.cloudflared/9af3b453-b2c4-4f31-a4a8-bbd2941c41d0.json

ingress:
  # 1. Trỏ domain phụ api.cfcbooking.io.vn về port 8080 của Spring Boot Backend
  - hostname: api.cfcbooking.io.vn
    service: http://localhost:8080

  # 2. Trỏ domain chính cfcbooking.io.vn về port 5173 của Frontend React/Vite
  - hostname: cfcbooking.io.vn
    service: http://localhost:5173

  # 3. Trỏ domain www.cfcbooking.io.vn về port 5173 của Frontend React/Vite (nếu có)
  - hostname: www.cfcbooking.io.vn
    service: http://localhost:5173
  
  # Cấu hình fallback trả về 404 cho các request không khớp
  - service: http_status:404